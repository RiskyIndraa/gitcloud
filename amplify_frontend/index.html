<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKS 2024 - Pendaftaran Peserta (Amplify)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input[type="text"], input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Pendaftaran Baru</h2>
    <form id="registForm">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit">Daftar Sekarang</button>
    </form>
    <p id="status"></p>
</div>

<script>
    const API_URL = "https://your-api-gateway-url.execute-api.us-east-1.amazonaws.com/prod/users";

    document.getElementById('registForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value
        };

        document.getElementById('status').innerText = "Mengirim...";

        try {
            // Ini akan memicu API Gateway yang kemudian memicu Step Functions
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(response.ok) {
                document.getElementById('status').innerText = "Berhasil Mendaftar!";
            } else {
                document.getElementById('status').innerText = "Gagal mendaftar.";
            }
        } catch(err) {
            document.getElementById('status').innerText = "Error jaringan!";
        }
    });
</script>

</body>
</html>
